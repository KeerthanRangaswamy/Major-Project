services:
  mongodb:
    image: mongo:7.0
    container_name: healthvoice-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-healthvoice}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet \"mongodb://$$MONGO_INITDB_ROOT_USERNAME:$$MONGO_INITDB_ROOT_PASSWORD@localhost:27017/admin?authSource=admin\" --eval \"db.runCommand({ ping: 1 }).ok\" >/dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  ml-service:
    build:
      context: ./services
      dockerfile: Dockerfile
    container_name: healthvoice-ml-service
    restart: unless-stopped
    ports:
      - "${ML_PORT:-8001}:8001"
    environment:
      PORT: 8001
      PYTHONUNBUFFERED: 1
    volumes:
      - ./services:/app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/docs').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthvoice-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      MONOGDB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/${MONGO_DB:-healthvoice}?authSource=admin
      SESSION_EXPIRY_TIME_IN_SECONDS: ${SESSION_EXPIRY_TIME_IN_SECONDS:-3600}
      SESSION_SECRET: ${SESSION_SECRET:-your-secret-key-change-in-production}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      MODEL_BASE_URL: ${MODEL_BASE_URL:-http://ml-service:8001}
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_uploads:/app/src/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthvoice-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongodb_data:
    driver: local
  backend_uploads:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local
